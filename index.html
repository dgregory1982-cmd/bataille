<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bataille 3D Royale</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none }
#ui { position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.7); padding:12px; border-radius:12px; z-index:100; font-size:18px }
#weapons { position:absolute; top:10px; right:10px; display:flex; gap:8px; z-index:100 }
.weapon { padding:10px 14px; background:#222; color:white; border-radius:8px; border:2px solid #555; font-size:14px }
.weapon.active { border-color:yellow; background:#444 }
#btns { position:absolute; bottom:25px; left:50%; transform:translateX(-50%); display:flex; gap:12px; z-index:100 }
button { padding:16px 22px; font-size:15px; border:none; border-radius:14px; color:white; font-weight:bold }
#build { background:#2d8f2d } #grenade { background:#e65c00 } #don { background:#ffaa00 }
#joystick { position:absolute; bottom:25px; left:25px; width:130px; height:130px; background:rgba(255,255,255,0.15); border-radius:50%; border:3px solid rgba(255,255,255,0.3) }
#stick { position:absolute; width:55px; height:55px; background:white; border-radius:50%; top:37px; left:37px; box-shadow:0 0 10px rgba(0,0,0,0.5) }
#aimZone { position:absolute; top:0; right:0; width:60%; height:70%; z-index:50 }
#startScreen, #gameOver { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; z-index:999 }
#startScreen button, #gameOver button { padding:25px 55px; font-size:28px; background:#ff0000; border:none; border-radius:20px; color:white; margin-top:20px }
</style>
</head>
<body>
<div id="startScreen">
  <h1>🔥 BATAILLE 3D ROYALE 🔥</h1>
  <p>Joystick gauche = bouger</p>
  <p>Glisse en haut à droite = viser/tirer</p>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" style="display:none">
  <h1>GAME OVER</h1>
  <p>Kills: <span id="finalKills">0</span></p>
  <button onclick="location.reload()">REJOUER</button>
</div>

<div id="ui">
  ❤️ <span id="hp">100</span> | 🧱 <span id="mats">200</span> | 💀 <span id="kills">0</span>
</div>

<div id="weapons">
  <div class="weapon active" onclick="setWeapon(0)">🔫 Pistol</div>
  <div class="weapon" onclick="setWeapon(1)">🔫 Shotgun</div>
  <div class="weapon" onclick="setWeapon(2)">💣 Grenade</div>
</div>

<div id="aimZone"></div>
<div id="joystick"><div id="stick"></div></div>
<div id="btns">
  <button id="build">BUILD</button>
  <button id="grenade">GRENADE</button>
  <button id="don">DON</button>
</div>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, bullets=[], enemies=[], walls=[], trees=[], houses=[];
let hp=100, mats=200, kills=0, weapon=0, gameStarted=false;
let moveX=0, moveZ=0, yaw=0, pitch=0, lastShot=0;

window.startGame = function() {
  document.getElementById('startScreen').style.display = 'none';
  gameStarted = true;
  init();
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // LUMIERE REALISTE
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(50, 100, 50);
  sun.castShadow = true;
  scene.add(sun);
  scene.add(new THREE.AmbientLight(0x404040, 0.6));

  // SOL TEXTURE
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(500, 500, 32, 32),
    new THREE.MeshLambertMaterial({color: 0x3a5f3a})
  );
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // JOUEUR REALISTE
  player = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.5), new THREE.MeshLambertMaterial({color: 0x00ff00}));
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshLambertMaterial({color: 0xffdbac}));
  head.position.y = 1;
  player.add(body); player.add(head);
  player.position.y = 1.5;
  scene.add(player);

  // DECORS REALISTES
  for(let i=0; i<12; i++) {
    const house = new THREE.Group();
    const base = new THREE.Mesh(new THREE.BoxGeometry(8,5,8), new THREE.MeshLambertMaterial({color: 0xd4a373}));
    const roof = new THREE.Mesh(new THREE.ConeGeometry(5.5,4,4), new THREE.MeshLambertMaterial({color: 0x9c2c2c}));
    roof.position.y = 4.5;
    house.add(base); house.add(roof);
    house.position.set(Math.random()*180-90, 2.5, Math.random()*180-90);
    house.castShadow = true;
    houses.push(house);
    scene.add(house);
  }

  for(let i=0; i<30; i++) {
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6,0.8,5), new THREE.MeshLambertMaterial({color: 0x8b5a2b}));
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(3), new THREE.MeshLambertMaterial({color: 0x2d6a2d}));
    leaves.position.y = 4;
    tree.add(trunk); tree.add(leaves);
    tree.position.set(Math.random()*250-125, 2.5, Math.random()*250-125);
    tree.castShadow = true;
    trees.push(tree);
    scene.add(tree);
  }

  spawnEnemies();
  animate();
  setupControls();
}

function spawnEnemies() {
  for(let i=0; i<6; i++) {
    const enemy = new THREE.Group();
    const eBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.5), new THREE.MeshLambertMaterial({color: 0xff0000}));
    const eHead = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshLambertMaterial({color: 0xffdbac}));
    eHead.position.y = 1;
    enemy.add(eBody); enemy.add(eHead);
    enemy.position.set(Math.random()*60-30, 1.5, Math.random()*60-30);
    enemy.hp = 50;
    enemy.castShadow = true;
    scene.add(enemy);
    enemies.push(enemy);
  }
}

window.setWeapon = function(w) {
  weapon = w;
  document.querySelectorAll('.weapon').forEach((el, i) => {
    el.classList.toggle('active', i==w);
  });
}

function shoot() {
  if(!gameStarted) return;
  const now = Date.now();
  if(now - lastShot < 250) return;
  lastShot = now;

  const shots = weapon==1? 6 : 1;
  const spread = weapon==1? 0.25 : 0;

  for(let i=0; i<shots; i++) {
    const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
    bullet.position.copy(player.position);
    bullet.position.y += 1;

    let dir = new THREE.Vector3(
      Math.sin(yaw) * Math.cos(pitch),
      Math.sin(pitch),
      -Math.cos(yaw) * Math.cos(pitch)
    );
    dir.x += (Math.random()-0.5)*spread;
    dir.y += (Math.random()-0.5)*spread;
    dir.z += (Math.random()-0.5)*spread;

    bullet.velocity = dir.normalize().multiplyScalar(weapon==1?0.7:1);
    bullet.damage = weapon==1?12:30;
    scene.add(bullet);
    bullets.push(bullet);
  }
}

function build() {
  if(mats < 50 ||!gameStarted) return;
  mats -= 50;
  const wall = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 0.6), new THREE.MeshLambertMaterial({color: 0x8B4513}));
  wall.position.copy(player.position);
  wall.position.z -= 3;
  wall.castShadow = true;
  scene.add(wall);
  walls.push(wall);
  updateUI();
}

function grenade() {
  if(!gameStarted) return;
  enemies.forEach(e => {
    if(e.position.distanceTo(player.position) < 10) {
      e.hp -= 60;
      if(e.hp <= 0) {
        scene.remove(e);
        enemies.splice(enemies.indexOf(e), 1);
        kills++;
        updateUI();
        spawnEnemies();
      }
    }
  });
}

function don() {
  mats += 100;
  updateUI();
}

function updateUI() {
  document.getElementById('hp').innerText = hp;
  document.getElementById('mats').innerText = mats;
  document.getElementById('kills').innerText = kills;
}

function gameOver() {
  gameStarted = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('finalKills').innerText = kills;
}

// CONTROLES NOUVEAU MODE
function setupControls() {
  // JOYSTICK GAUCHE = BOUGER
  const joy = document.getElementById('joystick');
  const stick = document.getElementById('stick');
  joy.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = joy.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left - 65;
    let y = e.touches[0].clientY - rect.top - 65;
    const dist = Math.min(Math.sqrt(x*x + y*y), 40);
    const angle = Math.atan2(y, x);
    stick.style.left = 65 + Math.cos(angle)*dist - 27 + 'px';
    stick.style.top = 65 + Math.sin(angle)*dist - 27 + 'px';
    moveX = Math.cos(angle)*0.25;
    moveZ = Math.sin(angle)*0.25;
  });
  joy.addEventListener('touchend', () => {
    stick.style.left = '37px';
    stick.style.top = '37px';
    moveX = moveZ = 0;
  });

  // ZONE HAUTE DROITE = VISER + TIRER
  const aimZone = document.getElementById('aimZone');
  let isAiming = false;
  aimZone.addEventListener('touchstart', e => {
    isAiming = true;
    updateAim(e.touches[0]);
  });
  aimZone.addEventListener('touchmove', e => {
    if(isAiming) updateAim(e.touches[0]);
  });
  aimZone.addEventListener('touchend', () => {
    if(isAiming) shoot();
    isAiming = false;
  });

  function updateAim(touch) {
    const centerX = window.innerWidth * 0.8;
    const centerY = window.innerHeight * 0.35;
    const dx = touch.clientX - centerX;
    const dy = touch.clientY - centerY;
    yaw = Math.atan2(dx, 100);
    pitch = Math.max(-0.8, Math.min(0.8, dy / 200));
    camera.rotation.y = -yaw;
    camera.rotation.x = pitch;
  }

  document.getElementById('build').onclick = build;
  document.getElementById('grenade').onclick = grenade;
  document.getElementById('don').onclick = don;
}

function animate() {
  requestAnimationFrame(animate);
  if(!gameStarted) return;

  player.position.x += moveX;
  player.position.z += moveZ;
  camera.position.x = player.position.x;
  camera.position.y = player.position.y + 0.5;
  camera.position.z = player.position.z;

  bullets = bullets.filter(b => {
    b.position.add(b.velocity);
    let remove = false;
    enemies.forEach(e => {
      if(b.position.distanceTo(e.position) < 1.5) {
        e.hp -= b.damage;
        scene.remove(b);
        remove = true;
        if(e.hp <= 0) {
          scene.remove(e);
          enemies.splice(enemies.indexOf(e), 1);
          kills++;
          updateUI();
          spawnEnemies();
        }
      }
    });
    if(remove || b.position.length() > 150) {
      scene.remove(b);
      return false;
    }
    return true;
  });

  enemies.forEach(e => {
    const dir = new THREE.Vector3(player.position.x - e.position.x, 0, player.position.z - e.position.z).normalize();
    e.position.add(dir.multiplyScalar(0.08));
    if(e.position.distanceTo(player.position) < 2) {
      hp -= 0.4;
      updateUI();
      if(hp <= 0) gameOver();
    }
  });

  renderer.render(scene, camera);
}

window.onresize = () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
