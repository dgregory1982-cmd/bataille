<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bataille 3D</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none }
#ui { position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.6); padding:10px; border-radius:10px; z-index:100; font-size:18px }
#weapons { position:absolute; top:10px; right:10px; display:flex; gap:10px; z-index:100 }
.weapon { padding:10px 15px; background:#333; color:white; border-radius:8px; border:2px solid #555 }
.weapon.active { border-color:yellow; background:#555 }
#btns { position:absolute; bottom:30px; width:100%; display:flex; justify-content:center; gap:15px; z-index:100 }
button { padding:18px 25px; font-size:16px; border:none; border-radius:15px; color:white; font-weight:bold }
#build { background:#33aa33 } #grenade { background:#ff6600 } #don { background:#ffaa00 }
#joystick { position:absolute; bottom:30px; left:30px; width:120px; height:120px; background:rgba(255,255,255,0.2); border-radius:50% }
#stick { position:absolute; width:50px; height:50px; background:white; border-radius:50%; top:35px; left:35px }
#startScreen, #gameOver { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; z-index:999 }
#startScreen button, #gameOver button { padding:25px 50px; font-size:28px; background:red; border:none; border-radius:20px; color:white; margin-top:20px }
</style>
</head>
<body>
<div id="startScreen">
  <h1>🔥 BATAILLE 3D 🔥</h1>
  <button onclick="startGame()">START</button>
  <p style="margin-top:20px">Tap n’importe où pour tirer!</p>
</div>

<div id="gameOver" style="display:none">
  <h1>GAME OVER</h1>
  <p>Kills: <span id="finalKills">0</span></p>
  <button onclick="location.reload()">REJOUER</button>
</div>

<div id="ui">
  ❤️ <span id="hp">100</span> | 🧱 <span id="mats">200</span> | 💀 <span id="kills">0</span>
</div>

<div id="weapons">
  <div class="weapon active" onclick="setWeapon(0)">🔫 Pistol</div>
  <div class="weapon" onclick="setWeapon(1)">🔫 Shotgun</div>
  <div class="weapon" onclick="setWeapon(2)">💣 Grenade</div>
</div>

<div id="joystick"><div id="stick"></div></div>
<div id="btns">
  <button id="build">BUILD</button>
  <button id="grenade">GRENADE</button>
  <button id="don">DON</button>
</div>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, bullets=[], enemies=[], walls=[];
let hp=100, mats=200, kills=0, weapon=0, gameStarted=false;
let moveX=0, moveZ=0, lastShot=0;

window.startGame = function() {
  document.getElementById('startScreen').style.display = 'none';
  gameStarted = true;
  init();
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer();
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));

  const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshLambertMaterial({color: 0x228B22}));
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  player = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshLambertMaterial({color: 0x00ff00}));
  player.position.y = 1;
  scene.add(player);
  camera.position.set(0, 5, 10);
  camera.lookAt(player.position);

  spawnEnemies();
  animate();
  setupControls();
}

function spawnEnemies() {
  for(let i=0; i<5; i++) {
    const enemy = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshLambertMaterial({color: 0xff0000}));
    enemy.position.set(Math.random()*40-20, 1, Math.random()*40-20);
    enemy.hp = 30;
    scene.add(enemy);
    enemies.push(enemy);
  }
}

window.setWeapon = function(w) {
  weapon = w;
  document.querySelectorAll('.weapon').forEach((el, i) => {
    el.classList.toggle('active', i==w);
  });
}

function shoot() {
  if(!gameStarted) return;
  const now = Date.now();
  if(now - lastShot < 200) return; // anti-spam
  lastShot = now;

  const shots = weapon==1? 5 : 1;
  const spread = weapon==1? 0.3 : 0;

  for(let i=0; i<shots; i++) {
    const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
    bullet.position.copy(player.position);

    let dir = new THREE.Vector3(moveX, 0, moveZ);
    if(dir.length() < 0.1) dir.set(0, 0, -1);
    dir.x += (Math.random()-0.5)*spread;
    dir.z += (Math.random()-0.5)*spread;

    bullet.velocity = dir.normalize().multiplyScalar(weapon==1?0.6:0.9);
    bullet.damage = weapon==1?15:25;
    scene.add(bullet);
    bullets.push(bullet);
  }
}

function build() {
  if(mats < 50 ||!gameStarted) return;
  mats -= 50;
  const wall = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 0.5), new THREE.MeshLambertMaterial({color: 0x8B4513}));
  wall.position.copy(player.position);
  wall.position.z -= 3;
  scene.add(wall);
  walls.push(wall);
  updateUI();
}

function grenade() {
  if(!gameStarted) return;
  enemies.forEach(e => {
    if(e.position.distanceTo(player.position) < 8) {
      e.hp -= 50;
      if(e.hp <= 0) {
        scene.remove(e);
        enemies.splice(enemies.indexOf(e), 1);
        kills++;
        updateUI();
        spawnEnemies();
      }
    }
  });
}

function don() {
  mats += 100;
  updateUI();
}

function updateUI() {
  document.getElementById('hp').innerText = hp;
  document.getElementById('mats').innerText = mats;
  document.getElementById('kills').innerText = kills;
}

function gameOver() {
  gameStarted = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('finalKills').innerText = kills;
}

function setupControls() {
  // NOUVEAU MODE : TAP POUR TIRER
  document.body.addEventListener('touchend', (e) => {
    if(!gameStarted) return;
    // Si t’as pas touché le joystick, ça tire
    if(!e.target.closest('#joystick') &&!e.target.closest('button')) {
      shoot();
    }
  });

  document.getElementById('build').onclick = build;
  document.getElementById('grenade').onclick = grenade;
  document.getElementById('don').onclick = don;

  const joy = document.getElementById('joystick');
  const stick = document.getElementById('stick');
  joy.addEventListener('touchmove', e => {
    e.preventDefault();
    const rect = joy.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left - 60;
    let y = e.touches[0].clientY - rect.top - 60;
    const dist = Math.min(Math.sqrt(x*x + y*y), 35);
    const angle = Math.atan2(y, x);
    stick.style.left = 60 + Math.cos(angle)*dist - 25 + 'px';
    stick.style.top = 60 + Math.sin(angle)*dist - 25 + 'px';
    moveX = Math.cos(angle)*0.3;
    moveZ = Math.sin(angle)*0.3;
  });
  joy.addEventListener('touchend', () => {
    stick.style.left = '35px';
    stick.style.top = '35px';
    moveX = moveZ = 0;
  });
}

function animate() {
  requestAnimationFrame(animate);
  if(!gameStarted) return;

  player.position.x += moveX;
  player.position.z += moveZ;
  camera.position.x = player.position.x;
  camera.position.z = player.position.z + 10;
  camera.lookAt(player.position);

  bullets = bullets.filter(b => {
    b.position.add(b.velocity);
    let remove = false;
    enemies.forEach(e => {
      if(b.position.distanceTo(e.position) < 1.2) {
        e.hp -= b.damage;
        scene.remove(b);
        remove = true;
        if(e.hp <= 0) {
          scene.remove(e);
          enemies.splice(enemies.indexOf(e), 1);
          kills++;
          updateUI();
          spawnEnemies();
        }
      }
    });
    if(remove || b.position.length() > 100) {
      scene.remove(b);
      return false;
    }
    return true;
  });

  enemies.forEach(e => {
    const dir = player.position.clone().sub(e.position).normalize();
    e.position.add(dir.multiplyScalar(0.05));
    if(e.position.distanceTo(player.position) < 1.5) {
      hp -= 0.5;
      updateUI();
      if(hp <= 0) gameOver();
    }
  });

  renderer.render(scene, camera);
}
</script>
</body>
</html>
