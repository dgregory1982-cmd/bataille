<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bataille 3D Royale</title>
<style>
body { margin:0; overflow:hidden; background:#000; font-family:Arial; touch-action:none }
#ui { position:absolute; top:10px; left:10px; color:white; background:rgba(0,0,0,0.7); padding:12px; border-radius:12px; z-index:100; font-size:18px }
#weapons { position:absolute; top:10px; right:10px; display:flex; gap:8px; z-index:100 }
.weapon { padding:10px 14px; background:#222; color:white; border-radius:8px; border:2px solid #555 }
.weapon.active { border-color:yellow; background:#444 }
#btns { position:absolute; bottom:25px; left:50%; transform:translateX(-50%); display:flex; gap:12px; z-index:100 }
button { padding:16px 22px; font-size:15px; border:none; border-radius:14px; color:white; font-weight:bold }
#build { background:#2d8f2d } #grenade { background:#e65c00 } #don { background:#ffaa00 }
#joystick { position:absolute; bottom:25px; left:25px; width:130px; height:130px; background:rgba(255,255,255,0.15); border-radius:50%; border:3px solid rgba(255,255,255,0.3); z-index:101 }
#stick { position:absolute; width:55px; height:55px; background:white; border-radius:50%; top:37px; left:37px }
.loot { position:absolute; color:gold; font-weight:bold; font-size:22px; pointer-events:none; animation:float 1s ease-out forwards; z-index:200 }
@keyframes float { 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-60px);opacity:0} }
#startScreen, #gameOver { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; justify-content:center; align-items:center; color:white; z-index:999 }
#startScreen button, #gameOver button { padding:25px 55px; font-size:28px; background:#ff0000; border:none; border-radius:20px; color:white }
</style>
</head>
<body>
<div id="startScreen">
  <h1>🔥 BATAILLE 3D 🔥</h1>
  <p>Gauche = Bouger</p>
  <p>Droite = Tap pour tirer</p>
  <p>Coffres dorés = +50 mats + Arme</p>
  <button onclick="startGame()">START</button>
</div>

<div id="gameOver" style="display:none">
  <h1>GAME OVER</h1>
  <p>Kills: <span id="finalKills">0</span></p>
  <button onclick="location.reload()">REJOUER</button>
</div>

<div id="ui">
  ❤️ <span id="hp">100</span> | 🧱 <span id="mats">200</span> | 💀 <span id="kills">0</span>
</div>

<div id="weapons">
  <div class="weapon active" onclick="setWeapon(0)">🔫 Pistol</div>
  <div class="weapon" onclick="setWeapon(1)">🔫 Shotgun</div>
  <div class="weapon" onclick="setWeapon(2)">💣 Grenade</div>
</div>

<div id="joystick"><div id="stick"></div></div>
<div id="btns">
  <button id="build">BUILD</button>
  <button id="grenade">GRENADE</button>
  <button id="don">DON</button>
</div>

<script type="importmap">
{"imports": {"three": "https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer, player, bullets=[], enemies=[], walls=[], chests=[];
let hp=100, mats=200, kills=0, weapon=0, xp=0, level=1, gameStarted=false;
let moveX=0, moveZ=0, lastShot=0;

window.startGame = function() {
  document.getElementById('startScreen').style.display = 'none';
  gameStarted = true;
  init();
}

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(30, 50, 30);
  scene.add(sun);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(400, 400),
    new THREE.MeshLambertMaterial({color: 0x3a5f3a})
  );
  ground.rotation.x = -Math.PI/2;
  scene.add(ground);

  // JOUEUR
  player = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.5), new THREE.MeshLambertMaterial({color: 0x00ff00}));
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshLambertMaterial({color: 0xffdbac}));
  head.position.y = 1;
  player.add(body); player.add(head);
  player.position.y = 1.5;
  scene.add(player);
  camera.position.set(0, 5, 10);

  // DECORS
  for(let i=0; i<8; i++) {
    const house = new THREE.Mesh(new THREE.BoxGeometry(8,5,8), new THREE.MeshLambertMaterial({color: 0xd4a373}));
    house.position.set(Math.random()*150-75, 2.5, Math.random()*150-75);
    scene.add(house);
  }
  for(let i=0; i<20; i++) {
    const tree = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.6,4), new THREE.MeshLambertMaterial({color: 0x8b5a2b}));
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(2.5), new THREE.MeshLambertMaterial({color: 0x2d6a2d}));
    leaves.position.y = 3.5;
    tree.add(trunk); tree.add(leaves);
    tree.position.set(Math.random()*200-100, 2, Math.random()*200-100);
    scene.add(tree);
  }

  // COFFRES DORÉS AJOUTÉS ICI
  spawnChests();
  spawnEnemies();
  animate();
  setupControls();
}

function spawnChests() {
  for(let i=0; i<8; i++) {
    const chest = new THREE.Mesh(
      new THREE.BoxGeometry(1.5,1,1.5),
      new THREE.MeshLambertMaterial({color: 0xffd700, emissive: 0xffaa00})
    );
    chest.position.set(Math.random()*120-60, 0.5, Math.random()*120-60);
    chest.userData = {opened:false};
    chests.push(chest);
    scene.add(chest);
  }
}

function spawnEnemies() {
  for(let i=0; i<5; i++) {
    const enemy = new THREE.Group();
    const eBody = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.5), new THREE.MeshLambertMaterial({color: 0xff0000}));
    const eHead = new THREE.Mesh(new THREE.SphereGeometry(0.35), new THREE.MeshLambertMaterial({color: 0xffdbac}));
    eHead.position.y = 1;
    enemy.add(eBody); enemy.add(eHead);
    enemy.position.set(Math.random()*50-25, 1.5, Math.random()*50-25);
    enemy.hp = 40;
    scene.add(enemy);
    enemies.push(enemy);
  }
}

window.setWeapon = function(w) {
  weapon = w;
  document.querySelectorAll('.weapon').forEach((el, i) => {
    el.classList.toggle('active', i==w);
  });
}

function shoot() {
  if(!gameStarted) return;
  const now = Date.now();
  if(now - lastShot < 200) return;
  lastShot = now;

  const shots = weapon==1? 6 : 1;
  const spread = weapon==1? 0.3 : 0;

  for(let i=0; i<shots; i++) {
    const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
    bullet.position.copy(player.position);
    bullet.position.y += 1;

    let dir = new THREE.Vector3(moveX, 0, moveZ);
    if(dir.length() < 0.1) dir.set(0, 0, -1);
    dir.x += (Math.random()-0.5)*spread;
    dir.z += (Math.random()-0.5)*spread;

    bullet.velocity = dir.normalize().multiplyScalar(weapon==1?0.7:1);
    bullet.damage = weapon==1?12:30;
    scene.add(bullet);
    bullets.push(bullet);
  }
}

function build() {
  if(mats < 50 ||!gameStarted) return;
  mats -= 50;
  const wall = new THREE.Mesh(new THREE.BoxGeometry(2.5, 3.5, 0.6), new THREE.MeshLambertMaterial({color: 0x8B4513}));
  wall.position.copy(player.position);
  wall.position.z -= 3;
  scene.add(wall);
  walls.push(wall);
  updateUI();
}

function grenade() {
  if(!gameStarted) return;
  enemies.forEach(e => {
    if(e.position.distanceTo(player.position) < 10) {
      e.hp -= 60;
      if(e.hp <= 0) {
        scene.remove(e);
        enemies.splice(enemies.indexOf(e), 1);
        kills++;
        updateUI();
        spawnEnemies();
      }
    }
  });
}

function don() {
  mats += 100;
  updateUI();
  showLoot("+100 🧱");
}

function showLoot(txt) {
  const div = document.createElement('div');
  div.className = 'loot';
  div.innerText = txt;
  div.style.left = window.innerWidth/2 + 'px';
  div.style.top = window.innerHeight/2 - 50 + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
}

function updateUI() {
  document.getElementById('hp').innerText = hp;
  document.getElementById('mats').innerText = mats;
  document.getElementById('kills').innerText = kills;
}

function gameOver() {
  gameStarted = false;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('finalKills').innerText = kills;
}

// CONTROLES
function setupControls() {
  const joy = document.getElementById('joystick');
  const stick = document.getElementById('stick');
  let joyActive = false;

  joy.addEventListener('touchstart', e => { joyActive = true; e.preventDefault(); });
  joy.addEventListener('touchmove', e => {
    if(!joyActive) return;
    e.preventDefault();
    const rect = joy.getBoundingClientRect();
    let x = e.touches[0].clientX - rect.left - 65;
    let y = e.touches[0].clientY - rect.top - 65;
    const dist = Math.min(Math.sqrt(x*x + y*y), 40);
    const angle = Math.atan2(y, x);
    stick.style.left = 65 + Math.cos(angle)*dist - 27 + 'px';
    stick.style.top = 65 + Math.sin(angle)*dist - 27 + 'px';
    moveX = Math.cos(angle)*0.25;
    moveZ = Math.sin(angle)*0.25;
  });
  joy.addEventListener('touchend', () => {
    joyActive = false;
    stick.style.left = '37px';
    stick.style.top = '37px';
    moveX = moveZ = 0;
  });

  document.body.addEventListener('touchend', (e) => {
    if(!gameStarted) return;
    if(!e.target.closest('#joystick') &&!e.target.closest('button')) {
      shoot();
    }
  });

  document.getElementById('build').onclick = build;
  document.getElementById('grenade').onclick = grenade;
  document.getElementById('don').onclick = don;
}

function animate() {
  requestAnimationFrame(animate);
  if(!gameStarted) return;

  player.position.x += moveX;
  player.position.z += moveZ;
  camera.position.x = player.position.x;
  camera.position.y = player.position.y + 3;
  camera.position.z = player.position.z + 8;
  camera.lookAt(player.position);

  // LOOT COFFRES
  chests = chests.filter(chest => {
    if(!chest.userData.opened && player.position.distanceTo(chest.position) < 2) {
      chest.userData.opened = true;
      chest.material.color.set(0x555);
      chest.material.emissive.set(0x000);
      mats += 50;
      xp += 20;
      updateUI();
      showLoot("+50 🧱 +20 XP");
      weapon = Math.floor(Math.random()*3);
      setWeapon(weapon);
      showLoot("Nouvelle arme!");
    }
    return true;
  });

  bullets = bullets.filter(b => {
    b.position.add(b.velocity);
    let remove = false;
    enemies.forEach(e => {
      if(b.position.distanceTo(e.position) < 1.5) {
        e.hp -= b.damage;
        scene.remove(b);
        remove = true;
        if(e.hp <= 0) {
          scene.remove(e);
          enemies.splice(enemies.indexOf(e), 1);
          kills++;
          updateUI();
          spawnEnemies();
        }
      }
    });
    if(remove || b.position.length() > 150) {
      scene.remove(b);
      return false;
    }
    return true;
  });

  enemies.forEach(e => {
    const dir = new THREE.Vector3(player.position.x - e.position.x, 0, player.position.z - e.position.z).normalize();
    e.position.add(dir.multiplyScalar(0.08));
    if(e.position.distanceTo(player.position) < 2) {
      hp -= 0.4;
      updateUI();
      if(hp <= 0) gameOver();
    }
  });

  renderer.render(scene, camera);
}
</script>
</body>
</html>
